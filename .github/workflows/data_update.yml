name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Remove old database
        run: |
          rm -f backend_database/trump_data.db
          echo "Old database removed"

      - name: Initialize fresh database
        env:
          TRUMPPULSE_DATA_DIR: backend_database
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python backend_database/init_db.py

      - name: Rebuild embeddings
        env:
          TRUMPPULSE_DATA_DIR: backend_database
        run: python backend_database/build_embeddings.py

      - name: Retrain model
        env:
          TRUMPPULSE_DATA_DIR: backend_database
        run: python backend/model_training.py

      - name: Upload artifacts to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRUMPPULSE_DATA_DIR: backend_database
        run: python backend/upload_artifacts.py