name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download artifacts from HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRUMPPULSE_DATA_DIR: backend_database
        run: |
          python backend/download_artifacts.py || python backend_database/init_db.py
      - name: Verify artifacts downloaded
        run: |
          echo "Checking files..."
          ls -la backend_database/
          ls -la backend/model_artifacts/
      - name: Pull new posts
        env:
          TRUMPPULSE_DATA_DIR: backend_database
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python backend_database/daily_update.py --once

      - name: Retrain model
        env:
          TRUMPPULSE_DATA_DIR: backend_database
        run: python backend/model_training.py

      - name: Upload artifacts to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRUMPPULSE_DATA_DIR: backend_database
        run: python backend/upload_artifacts.py